<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CURRENCY CONVERTOR</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="stylesheet" href="style.css">
    
</head>
<body>
    <div class="content">
    <h1>Currency Convertor</h1>
    <form action="currency-exchane">
        <div class="main-content">
    <div class="from">
        <div class="headoffrom">From</div>
        <div class="enteramount">Enter amount</div>
        <div class="countryselector">
            <img src="https://flagsapi.com/US/flat/64.png" id="image" />
            <select name="from" class="countryselect"></select>
            <input class="input" type="number" placeholder="Enter the amount"> 
        
      </div>
      <button class="submit-button">Get exchange rate</button>
    </div>
    <div class="exchangeicon">  </div>
    <div class="to">
        <div class="headofto">To</div>
        <div class="amountwillbe">Amount will be</div>
        <div class="countryselector2">
            <img src="https://flagsapi.com/IN/flat/64.png" id="image2"/>
            <select name="to" class="countryselect"></select>
                <input type="number" placeholder="Amount wiil be" class="output"/>
        
       
</div><div class="useless"> </div> 
</div>

</form>
</div>
    <script src="code.js"></script>
    <script src="style.js"></script>
</body>
</html>
